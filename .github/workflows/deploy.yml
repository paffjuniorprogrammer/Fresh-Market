name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Install Flutter 🚀
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies 📦
        run: flutter pub get

      - name: Build Web 🏗️
        run: |
          DART_DEFINES=""
          # Parse the single APP_SECRETS block into individual --dart-define flags
          while IFS= read -r line || [[ -n "$line" ]]; do
            if [[ ! -z "$line" && "$line" != "#"* ]]; then
              DART_DEFINES="$DART_DEFINES --dart-define=$line"
            fi
          done <<< "${{ secrets.APP_SECRETS }}"
          
          flutter build web --release --base-href /Fresh-Market/ $DART_DEFINES

      - name: Upload artifact 📤
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages 🚀
        id: deployment
        uses: actions/deploy-pages@v4
