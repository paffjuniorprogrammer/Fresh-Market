name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v4

      - name: Install Flutter 🚀
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Install Dependencies 📦
        run: flutter pub get

      - name: Build Web 🏗️
        run: flutter build web --release --base-href /Fresh-Market/

      - name: Deploy 🚀
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: build/web
          branch: gh-pages
